<div class="chat-container">
    <div class="chat-box">
      <div *ngFor="let msg of mensajes" [ngClass]="{'cliente': msg.de === 'cliente', 'bot': msg.de === 'bot'}">
        <strong *ngIf="msg.de === 'cliente'">Tú:</strong>
        <strong *ngIf="msg.de === 'bot'">Bot:</strong>
        <span>{{ msg.texto }}</span>
      </div>
      <div *ngIf="cargando">Escribiendo...</div>
    </div>
  
    <div class="chat-input">
      <input [(ngModel)]="mensaje" placeholder="Escribe tu mensaje" (keyup.enter)="enviarMensaje()">
      <button (click)="enviarMensaje()">Enviar</button>
    </div>
  </div>
